<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DROP 01 Atelier | Independent Designer Drops</title>
    <meta
      name="description"
      content="DROP 01 Atelier is a designer-led platform turning independent fashion ideas into limited, preorder-driven drops."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="dropo1.svg" />
    <link rel="icon" type="image/png" href="dropo1.png" />
    <link rel="apple-touch-icon" href="dropo1.png" />
    <link rel="stylesheet" href="assets/css/styles.css?v=20260328-6" />
  </head>
  <body class="page-home">
    <header class="site-header">
      <div class="site-header__inner">
        <nav class="site-nav site-nav--left" aria-label="Primary">
          <a href="#subscribe">Subscribe</a>
          <a href="about.html">About</a>
        </nav>
        <a class="brand brand--header" href="index.html" aria-label="DROP 01 Atelier home">
          <img class="brand__logo" src="dropo1.svg" alt="DROP 01 Atelier" />
        </a>
        <nav class="site-nav site-nav--right" aria-label="Primary">
          <a href="shop.html">Shop</a>
          <a href="designers.html">For Designers</a>
          <a href="contact.html">Contact Us</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="hero notice-board-hero" data-notice-board>
        <div class="hero__board-shell">
          <div class="hero__board" aria-hidden="true">
            <canvas id="notice-board-canvas"></canvas>
          </div>

          <div class="hero__overlay">
            <div class="hero__mobile-header" aria-label="Hero navigation">
              <nav class="hero__mobile-nav-row" aria-label="Hero primary links">
                <a href="#subscribe">Subscribe</a>
                <a href="about.html">About</a>
              </nav>
              <a class="brand brand--hero-mobile" href="index.html" aria-label="DROP 01 Atelier home">
                <img class="brand__logo" src="dropo1.svg" alt="DROP 01 Atelier" />
              </a>
              <nav class="hero__mobile-nav-row" aria-label="Hero secondary links">
                <a href="shop.html">Shop</a>
                <a href="designers.html">For Designers</a>
                <a href="contact.html">Contact Us</a>
              </nav>
            </div>

     

            <div class="hero__logo-slot" aria-hidden="true"></div>

            <form class="hero-note-form" data-note-form autocomplete="off">
              <label for="hero-note-input">Add your own note to the wall</label>
              <div class="hero-note-form__row">
                <input
                  id="hero-note-input"
                  name="note"
                  type="text"
                  maxlength="64"
                  placeholder="Write a drop idea, phrase, or reminder"
                  data-note-input
                  required
                />
                <button class="button" type="submit" data-hover-lift>Pin It</button>
              </div>
              <p class="hero-note-form__status form-note" data-note-status aria-live="polite">
                Type a note and pin it to the board.
              </p>
            </form>

            <aside class="hero__subscribe-card" data-delayed-subscribe hidden>
              <span>Join us today</span>
              <form
                class="mini-form"
                data-webhook-form="newsletter-subscribe"
                data-success-message="You are on the list for the next limited release."
              >
                <div class="field">
                  <label for="hero-subscribe-email">Email address</label>
                  <input
                    id="hero-subscribe-email"
                    name="email"
                    type="email"
                    placeholder="your@email.com"
                    required
                  />
                </div>
                <button class="button" type="submit" data-hover-lift>Let’s go</button>
              </form>
            </aside>
          </div>
        </div>
      </section>

      <section class="section home-section home-section--subscribe" id="subscribe">
        <div class="home-section__intro">
          <p class="eyebrow">Join us today</p>
          <h2 class="title-md">Subscribe for exclusive drops, atelier updates, and early access.</h2>
          
        </div>
        <form
          class="subscribe-form home-subscribe-form"
          data-webhook-form="newsletter-subscribe"
          data-success-message="You are on the list for the next limited release."
        >
          <div class="field">
            <label for="subscribe-email">Email address</label>
            <input id="subscribe-email" name="email" type="email" placeholder="your@email.com" required />
          </div>
          <button class="button" type="submit">Let's go</button>
          <p class="form-note">No spam. Only new drops, capsule previews, and designer stories.</p>
        </form>
      </section>

   
      <!-- Product-facing preview content is intentionally hidden until real inventory is ready.
           Restore instructions live in Agents.md. -->
      <section class="section home-product-placeholder" data-product-preview="featured-release" hidden>
        <!-- Featured release intentionally hidden until real products are ready. -->
      </section>

      <section class="section home-product-placeholder" data-product-preview="shop-preview" hidden>
        <div class="drops-grid" data-shopify-grid-disabled="home" data-shopify-limit="3"></div>
      </section>

     

      
    </main>

   

   

    <script src="assets/js/site-config.js?v=20260328-3"></script>
    <script src="assets/js/site-config.public.js?v=20260329-2"></script>
    <script src="assets/js/site-config.local.js?v=20260329-1"></script>
    <script type="module" src="assets/js/main.js?v=20260328-5"></script>
  </body>
</html>
